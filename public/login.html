<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Campus Gallery</title>
  <meta name="description" content="Sign in to access your Campus Gallery." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body class="login-body">

  <div class="login-layout">

    <!-- LEFT PANEL -->
    <aside class="login-panel" aria-hidden="true">
      <div class="panel-grid" id="panelGrid"></div>
      <div class="panel-blob panel-blob--1"></div>
      <div class="panel-blob panel-blob--2"></div>

      <div class="panel-content">
        <div class="panel-logo js-panel-logo">
          <span class="panel-logo__dot"></span>
          Campus Gallery
        </div>
        <blockquote class="panel-quote js-panel-quote">
          <p>"Every frame holds<br/>a moment that<br/><em>was, and always will be.</em>"</p>
        </blockquote>
        <div class="panel-meta js-panel-meta">
          <span class="panel-meta__line"></span>
          <span>Private Collection · Est. 2024</span>
        </div>
      </div>

      <button class="theme-toggle login-theme-toggle" aria-label="Toggle theme"></button>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="login-form-side">
      <div class="login-form-wrapper">

        <div class="login-mobile-logo">
          <span class="panel-logo__dot"></span>
          Campus Gallery
        </div>

        <div class="login-heading js-login-heading">
          <p class="label-tag">Welcome back</p>
          <h1>Sign in to<br/><em>your gallery</em></h1>
        </div>

        <div class="login-error" id="loginError" role="alert" aria-live="polite" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginErrorText">Invalid credentials. Please try again.</span>
        </div>

        <div class="login-form js-login-form" id="loginFormEl">

          <div class="form-field" id="fieldUsername">
            <label class="form-label" for="username">Username</label>
            <div class="form-input-wrap">
              <svg class="form-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="username" name="username" class="form-input"
                placeholder="Enter your username" autocomplete="username" required />
            </div>
          </div>

          <div class="form-field" id="fieldPassword">
            <label class="form-label" for="password">Password</label>
            <div class="form-input-wrap">
              <svg class="form-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" name="password" class="form-input"
                placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="form-pw-toggle" id="pwToggle" aria-label="Show password">
                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="button" class="btn btn--primary login-submit" id="loginBtn">
            <span class="login-submit__text">Sign In</span>
            <svg class="login-submit__spinner" id="loginSpinner" width="16" height="16"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </button>

        </div>

        <p class="login-footer-note">
          This is a private gallery. Only invited friends can log in.
        </p>

      </div>
    </main>

  </div>

  <script src="/js/global.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
